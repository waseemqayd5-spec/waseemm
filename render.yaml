services:
  - type: web
    name: bashair-pharmacy
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bashair-db
          property: connectionString
    buildFilter:
      paths:
        - app.py
        - requirements.txt

databases:
  - name: bashair-db
    plan: starter
